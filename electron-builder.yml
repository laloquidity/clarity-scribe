# Clarity Scribe — electron-builder configuration
appId: com.clarity-scribe.app
productName: Clarity Scribe
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  # Strip koffi binaries for platforms we never target
  - "!node_modules/koffi/build/koffi/linux_*"
  - "!node_modules/koffi/build/koffi/musl_*"
  - "!node_modules/koffi/build/koffi/freebsd_*"
  - "!node_modules/koffi/build/koffi/openbsd_*"
npmRebuild: false
asar: true
asarUnpack:
  - "node_modules/@napi-rs/**"
  - "node_modules/whisper-node/**"
  - "node_modules/smart-whisper/**"
  - "node_modules/onnxruntime-node/**"
  - "node_modules/koffi/**"
  - "node_modules/uiohook-napi/**"
mac:
  target:
    - dmg
  category: public.app-category.productivity
  icon: resources/icon.icns
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    # Suppresses "Add NSCameraUseContinuityCameraDeviceType to your Info.plist"
    # warning from macOS AVFoundation when Electron's plugin helper enumerates
    # audio/camera devices during mic access. Declares we are aware of and
    # opt into Continuity Camera device type enumeration.
    NSCameraUseContinuityCameraDeviceType: true
  # Bundle the native CoreML ANE Parakeet sidecar (Apple Silicon). Built by
  # `npm run build:sidecar:mac` before packaging; lands at Contents/Resources/
  # parakeet-sidecar, where parakeetSidecar.ts looks for it in production.
  # electron-builder signs nested Mach-O executables with the app's hardened
  # runtime + entitlements, which is required for notarization.
  extraResources:
    - from: "native/parakeet-sidecar/.build/release/parakeet-sidecar"
      to: "parakeet-sidecar"
    # Menu-bar tray icon loaded at runtime via process.resourcesPath
    - from: "resources/icon.png"
      to: "icon.png"
    # Self-contained MCP stdio bridge (see mcp/ and README "MCP server")
    - from: "dist-mcp/scribe-mcp.mjs"
      to: "scribe-mcp.mjs"
  files:
    - "!node_modules/koffi/build/koffi/win32_*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  extraResources:
    - from: "resources/win-gpu/"
      to: "win-gpu/"
      filter: ["**/*.dll"]
    # Tray icon loaded at runtime via process.resourcesPath (main.ts createTrayIcon)
    - from: "resources/icon.ico"
      to: "icon.ico"
    # Self-contained MCP stdio bridge (see mcp/ and README "MCP server")
    - from: "dist-mcp/scribe-mcp.mjs"
      to: "scribe-mcp.mjs"
    # Screen-agent vision sidecar script (run with the OmniParser venv python)
    - from: "agent/"
      to: "agent/"
    # Screen-agent accessibility reader (prebuilt, see native/uia-probe/)
    - from: "native/uia-probe/uia-probe.exe"
      to: "uia-probe.exe"
  files:
    - "!node_modules/koffi/build/koffi/darwin_*"
nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true

